name: Deploy to GitHub Pages

on:
  # Manual runs only
  workflow_dispatch:

# Least-privilege token + the OIDC id-token the Pages deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Queue overlapping deploys instead of cancelling an in-flight one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run build` emits dist/ AND dist/404.html (SPA deep-link fallback,
      # generated by the spa-404-fallback plugin in vite.config.js).
      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
